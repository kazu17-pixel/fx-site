<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロット計算ツール</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0 15px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 12px;
  text-align: center;
}
</style>
</head>

<body>

<h1>ロット計算ツール</h1>

<div class="card">

<label>口座タイプ</label>
<select id="account">
  <option value="10000">国内口座（1ロット=1万通貨）</option>
  <option value="100000">海外口座（1ロット=10万通貨）</option>
</select>

<label>通貨ペア</label>
<select id="pair">
  <option value="USDJPY">USDJPY</option>
  <option value="EURUSD">EURUSD</option>
  <option value="GBPUSD">GBPUSD</option>
  <option value="EURJPY">EURJPY</option>
  <option value="GBPJPY">GBPJPY</option>
  <option value="XAUUSD">XAUUSD（ゴールド）</option>
  <option value="XAGUSD">XAGUSD（シルバー）</option>
  <option value="BTCUSD">BTCUSD</option>
  <option value="ETHUSD">ETHUSD</option>
</select>

<label>資金（円）</label>
<input type="number" id="balance" value="100000">

<label>リスク（%）</label>
<input type="number" id="risk" value="1">

<label>損切り幅（pips）</label>
<input type="number" id="stop" value="20">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

</div>

<script>
function calc() {

  let balance = parseFloat(document.getElementById("balance").value);
  let risk = parseFloat(document.getElementById("risk").value);
  let stop = parseFloat(document.getElementById("stop").value);
  let lotUnit = parseFloat(document.getElementById("account").value);
  let pair = document.getElementById("pair").value;

  if (balance == null || risk == null || stop == null) {
    document.getElementById("result").innerText = "全部入力して";
    return;
  }

  let riskAmount = balance * (risk / 100);
  let pipInYen = 0;

  switch (pair) {

    // FX（口座単位影響あり）
    case "USDJPY":
    case "EURJPY":
    case "GBPJPY":
      pipInYen = lotUnit * 0.01;
      break;

    case "EURUSD":
    case "GBPUSD":
      pipInYen = lotUnit * 0.0001 * 150;
      break;

    // ゴールド
    case "XAUUSD":
      pipInYen = 1500;
      break;

    case "XAGUSD":
      pipInYen = 200;
      break;

    // クリプト（固定モデル）
    case "BTCUSD":
      pipInYen = 5000;
      break;

    case "ETHUSD":
      pipInYen = 3000;
      break;
  }

  let lot = riskAmount / (stop * pipInYen);
  let minLot = 0.01;

  if (lot < minLot) {

    let required = (minLot * stop * pipInYen) / (risk / 100);
    let shortage = required - balance;

    document.getElementById("result").innerHTML =
      "⚠️ 必要資金不足<br>" +
      "必要資金: " + required.toFixed(0) + " 円<br>" +
      "不足: " + shortage.toFixed(0) + " 円";
    return;
  }

  let riskLevel = risk <= 1 ? "🟢 安全" :
                  risk <= 2 ? "🟡 普通" :
                  "🔴 危険";

  document.getElementById("result").innerHTML =
    "ロット数: " + Math.floor(lot * 100) / 100 + "<br>" +
    "想定損失: " + riskAmount.toFixed(0) + " 円<br>" +
    "リスク評価: " + riskLevel;
}
</script>

</body>
</html>
