<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロット計算ツール</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0 15px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 12px;
  text-align: center;
}

.result span {
  display: block;
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>ロット計算ツール</h1>

<div class="card">

<label>口座タイプ</label>
<select id="account">
  <option value="10000">国内口座（1ロット=1万通貨）</option>
  <option value="100000">海外口座（1ロット=10万通貨）</option>
</select>

<label>通貨ペア</label>
<select id="pair">
  <option value="USDJPY">USDJPY</option>

  <option value="EURUSD">EURUSD</option>
  <option value="GBPUSD">GBPUSD</option>
  <option value="AUDUSD">AUDUSD</option>

  <option value="EURJPY">EURJPY</option>
  <option value="GBPJPY">GBPJPY</option>

  <option value="XAUUSD">XAUUSD（ゴールド）</option>
  <option value="XAGUSD">XAGUSD（シルバー）</option>

  <option value="BTCUSD">BTCUSD</option>
  <option value="ETHUSD">ETHUSD</option>
</select>

<label>資金（円）</label>
<input type="number" id="balance">

<label>リスク（%）</label>
<input type="number" id="risk">

<label>損切り幅（pips）</label>
<input type="number" id="stop">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

</div>

<script>
function calc() {
  let balance = parseFloat(document.getElementById("balance").value);
  let risk = parseFloat(document.getElementById("risk").value);
  let stop = parseFloat(document.getElementById("stop").value);
  let accountSize = parseFloat(document.getElementById("account").value);
  let pair = document.getElementById("pair").value;

  if (!balance || !risk || !stop) {
    document.getElementById("result").innerText = "全部入力して";
    return;
  }

  let riskAmount = balance * (risk / 100);

  let pipValue;

  switch (pair) {

  case "USDJPY":
  case "EURJPY":
  case "GBPJPY":
    pipValue = accountSize * 0.01;
    break;

  case "EURUSD":
  case "GBPUSD":
  case "AUDUSD":
    pipValue = accountSize * 0.0001 * 150;
    break;

  case "XAUUSD":
  pipValue = 100 * 150;
  break;

  case "XAGUSD":
    pipValue = accountSize * 0.01 * 150;
    break;

  case "BTCUSD":
    pipValue = accountSize * 1 * 150;
    break;

  case "ETHUSD":
    pipValue = accountSize * 0.1 * 150;
    break;

  default:
    document.getElementById("result").innerHTML =
      "⚠️ 通貨が未対応です";
    return;
}
  if (!pipValue) {
  document.getElementById("result").innerText = "計算エラー";
  return;
}

  let lot = riskAmount / (stop * pipValue);

  let minLot = 0.01;

  let requiredRiskAmount = minLot * stop * pipValue;
  let requiredBalance = requiredRiskAmount / (risk / 100);

  if (lot < minLot) {
    let shortage = requiredBalance - balance;

    document.getElementById("result").innerHTML =
      "⚠️ 必要資金不足<br>" +
      "必要資金: <span>" + requiredBalance.toFixed(0) + " 円</span>" +
      "<br>あと: <span>" + shortage.toFixed(0) + " 円</span>";
    return;
  }

 let riskLevel = "";

if (risk <= 1) {
  riskLevel = "🟢 安全";
} else if (risk <= 2) {
  riskLevel = "🟡 普通";
} else {
  riskLevel = "🔴 危険";
}

document.getElementById("result").innerHTML =
  "ロット数: <span>" + lot.toFixed(3) + "</span>" +
  "想定損失: <span>" + riskAmount.toFixed(0) + " 円</span>" +
  "<br>リスク評価: <span>" + riskLevel + "</span>";
}
</script>

</body>
</html>
